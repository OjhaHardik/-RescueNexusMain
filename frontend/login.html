<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - RescueNexus</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="auth-layout">
        <!-- Glowing Orbs behind the Glass Card -->
        <div class="auth-glow-orange"></div>
        <div class="auth-glow-blue"></div>

        <div class="auth-card">
            <h1 class="logo">Rescue<span>Nexus</span></h1>
            <p class="subtitle">Sign in to your account</p>

            <div class="auth-input-group">
                <label>Phone Number</label>
                <div class="auth-input-inline">
                    <input type="text" id="phone" placeholder="e.g. 9988776655">
                </div>
            </div>

            <div class="auth-input-group">
                <label>Password</label>
                <div class="auth-input-inline">
                    <input type="password" id="password" placeholder="••••••••">
                    <button class="auth-inline-btn" onclick="login()">➔</button>
                </div>
            </div>



            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        function login() {
            fetch("http://127.0.0.1:8000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    phone: document.getElementById("phone").value,
                    password: document.getElementById("password").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.user_id) {
                        localStorage.setItem("user_id", data.user_id);
                        localStorage.setItem("user_name", data.name);
                        window.location = "citizen.html";
                    } else {
                        alert("Login failed");
                    }
                });
        }
    </script>
</body>

</html>
