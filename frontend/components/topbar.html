<!-- =========================================
     TOPBAR COMPONENT
     -----------------------------------------
     Displays current page title
     and quick action buttons
========================================= -->

<div class="topbar">

    <!-- Topbar Left: Mobile Toggle & Title -->
    <div style="display: flex; align-items: center; gap: 16px;">
        <button class="hamburger-btn" onclick="document.body.classList.toggle('sidebar-open')" title="Toggle Menu">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <!-- Dynamic Page Title -->
        <!-- Updated automatically by loadPage() -->
        <h1 id="pageTitle" style="margin: 0;">Dashboard</h1>
    </div>

    <!-- Top Right Action Buttons -->
    <div class="top-actions">
        <!-- Quick Emergency Broadcast Trigger -->
        <button class="btn-orange btn-pulse" onclick="loadPage('broadcast')">
            Emergency Broadcast
        </button>
    </div>

</div>
