<div class="card" style="margin-bottom: 24px;">
    <h2 style="margin-top: 0; margin-bottom: 20px;">Emergency Broadcast Center</h2>

    <div class="broadcast-panel">
        <label style="color: var(--text-muted); margin-bottom: 10px; display: block;">Select Incident to Setup Broadcast:</label>
        <select id="broadcastIncident" style="margin-bottom: 20px;">
            <option value="">Select Incident...</option>
        </select>

        <!-- CONTROLS -->
        <div class="form-grid" style="align-items: center;">
            <div>
                <label style="display:block; margin-bottom:8px; font-size:14px; color: var(--text-muted);">Delivery Method:</label>
                <select id="broadcastMethod">
                    <option value="all">All (SMS + Email)</option>
                    <option value="sms">SMS Only</option>
                    <option value="email">Email Only</option>
                </select>
            </div>
            
            <div>
                <label style="display:block; margin-bottom:8px; font-size:14px; color: var(--text-muted);">Broadcast Radius (km):</label>
                <input type="number" id="broadcastRadius" placeholder="e.g. 5" min="1">
            </div>
            
            <div style="display:flex; align-items:flex-end; height:100%;">
                <button class="btn-orange btn-pulse" style="width: 100%; padding: 12px; margin-top: 24px;" onclick="sendBroadcast()">
                    ⚠️ Send Emergency Alert
                </button>
            </div>
        </div>
    </div>
</div>

<!-- LOGS -->
<div class="card">
    <h3 style="margin-top:0;">Broadcast Logs</h3>
    <div id="broadcastLogs" class="broadcast-logs" style="margin-top:10px;">
        <p style="color: var(--text-muted); font-size: 14px;">No recent broadcasts.</p>
    </div>
</div>

<script src="assets/js/broadcast.js"></script>
