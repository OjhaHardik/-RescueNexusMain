<h2>User Management</h2>

<div class="card" style="margin-bottom: 24px;">

    <h3 style="margin-top: 0; margin-bottom: 20px; color: var(--accent-orange);">Register New User</h3>

    <div class="form-grid">
        <input type="text" id="userName" placeholder="Full Name">
        <input type="text" id="userPhone" placeholder="Phone Number">
        <input type="email" id="userEmail" placeholder="Email Address">
        <input type="password" id="userPassword" placeholder="Password">
    </div>

    <!-- Responsive Location Helpers -->
    <style>
        .responsive-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }

        @media (max-width: 600px) {
            .responsive-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .responsive-bar button {
                width: 100%;
            }

            #userMap {
                height: 250px !important;
                /* Smaller map for phones */
            }
        }
    </style>

    <div class="responsive-bar">
        <span style="color: var(--text-muted); font-size: 14px;">Select location using the map search or click "Use My
            Location".</span>
        <button class="btn-orange" onclick="detectLocation()">Use My Location</button>
    </div>

    <div id="userMap"
        style="height:350px; border: 1px solid rgba(255,255,255,0.1); border-radius:12px; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
    </div>

    <div class="responsive-bar">
        <p id="selectedCoords" style="color:#a1a1aa; font-weight: 500; margin: 0; text-align: center;">
            No location selected
        </p>
        <button class="btn-blue" onclick="addUser()">Add User</button>
    </div>

</div>

<div class="card">
    <h3 style="margin-top: 0; margin-bottom: 20px;">Active Users</h3>
    <div class="rn-table">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<script src="assets/js/users.js"></script>
