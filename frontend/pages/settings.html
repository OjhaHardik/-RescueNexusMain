<h2>System Settings</h2>

<div class="card">
    <label>Default Alert Radius (km)</label>
    <input type="number" id="defaultRadius" value="5">

    <label>Enable SMS Simulation</label>
    <select id="smsMode">
        <option value="on">ON</option>
        <option value="off">OFF</option>
    </select>

    <button class="btn-blue" onclick="saveSettings()">Save Settings</button>
</div>
